<!DOCTYPE html>
<html>
<head>
    <title>Math Test</title>
</head>
<body>

<!-- START OF TEST -->

<h1>Math Test</h1>

<form>

    <!-- Name -->
    <label>Your Name:</label><br>
    <input type="text" name="name"><br><br>

    <!-- Question 1 -->
    <p>1. What is 5 + 3?</p>
    <input type="radio" name="q1"> 6<br>
    <input type="radio" name="q1"> 8<br>
    <input type="radio" name="q1"> 10<br><br>

    <!-- Question 2 -->
    <p>2. What is 10 - 4?</p>
    <input type="radio" name="q2"> 5<br>
    <input type="radio" name="q2"> 6<br>
    <input type="radio" name="q2"> 7<br><br>

    <!-- Question 3 -->
    <p>3. What is 3 × 3?</p>
    <input type="radio" name="q3"> 6<br>
    <input type="radio" name="q3"> 9<br>
    <input type="radio" name="q3"> 12<br><br>

    <!-- Word Problem -->
    <p>4. Solve: If a = 2 and b = 3, what is a + b?</p>
    <textarea rows="4" cols="30"></textarea><br><br>

    <!-- Math symbols -->
    <p>Math symbols: &lt; &gt; &amp;</p>

    <!-- Submit -->
    <button type="submit">Submit</button>

</form>

<!-- END OF TEST -->

</body>
</html>
