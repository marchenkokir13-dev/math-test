<!DOCTYPE html>
<html>
<head>
    <title>Sakura Color Scheme</title>
</head>
<body>

<h1 style="color:#8B0000; font-family: Arial;">Sakura Color Scheme</h1>

<table border="1">
    <tr>
        <th colspan="4" style="font-size:24px; color:#8B0000;">
            Sakura Theme
        </th>
    </tr>

    <tr>
        <th>Color Name</th>
        <th>HEX</th>
        <th>RGB</th>
        <th>HSL</th>
    </tr>

    <tr>
        <td style="background-color:#FFC0CB;">Light Pink</td>
        <td>#FFC0CB</td>
        <td>rgb(255, 192, 203)</td>
        <td>hsl(350, 100%, 88%)</td>
    </tr>

    <tr>
        <td style="background-color:#FF69B4;">Pink</td>
        <td>#FF69B4</td>
        <td>rgb(255, 105, 180)</td>
        <td>hsl(330, 100%, 70%)</td>
    </tr>

    <tr>
        <td style="background-color:#FFF5F7;">Sakura White</td>
        <td>#FFF5F7</td>
        <td>rgb(255, 245, 247)</td>
        <td>hsl(348, 100%, 98%)</td>
    </tr>

    <tr>
        <td style="background-color:#8B0000; color:white;">Dark Red</td>
        <td>#8B0000</td>
        <td>rgb(139, 0, 0)</td>
        <td>hsl(0, 100%, 27%)</td>
    </tr>
</table>

</body>
</html>
